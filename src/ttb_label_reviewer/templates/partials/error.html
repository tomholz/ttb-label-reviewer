{# Visible error fragment: extraction failures, bad uploads, and
   validation problems all land here rather than failing silently. #}
<div class="card error-card" role="alert">
  <strong>Review could not be completed.</strong>
  <p>{{ detail }}</p>
  <p class="error-hint">Fix the issue above and press Review label again.
     Nothing was stored.</p>
</div>
